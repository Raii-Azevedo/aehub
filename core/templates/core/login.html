{% extends 'core/base.html' %}
{% load static %}

{% block navbar %}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <img src="{% static 'images/logo.png' %}" alt="Logo" height="300">
                </div>
                
                {% if erro %}
                <div class="alert alert-danger">{{ erro }}</div>
                {% endif %}

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Corporate email</label>
                        <input type="email" name="email" class="form-control"
                               placeholder="nome.sobrenome@artefact.com" required>
                    </div>
                    <button type="submit" class="btn btn-gradient w-100 py-2">Sign In</button>
                </form>
                
                <div class="text-center mt-4">
                    <small class="text-white-50">🔒 Only @artefact email accounts authorized</small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
